<!DOCTYPE html>
<html>
<body>

<h2>Universal Calculator</h2>

<input type="text" id="input" placeholder="Enter value">
<button onclick="sendData()">Submit</button>

<p id="output"></p>

<script>
function sendData() {
    let val = document.getElementById("input").value;

    fetch('/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({value: val})
    });
}

// get latest value every 1 second
setInterval(() => {
    fetch('/get')
    .then(res => res.json())
    .then(data => {
        document.getElementById("output").innerHTML = data.value;
    });
}, 1000);
</script>

</body>
</html>
