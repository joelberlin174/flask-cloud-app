<!DOCTYPE html>
<html>
<body style="background:#121212;color:white;text-align:center;">

<h2>📁 Cloud Storage</h2>

<form action="/create_folder" method="post">
    <input type="text" name="folder" placeholder="Folder name">
    <button>Create Folder</button>
</form>

<h3>Folders</h3>

{% for folder in folders %}
    <p><a href="/folder/{{folder}}" style="color:lightgreen;">📁 {{folder}}</a></p>
{% endfor %}

</body>
</html>
