<script>
let display = document.getElementById("display");

// Button click
function press(val) {
    display.value += val;
}

// Calculate
function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

// Clear
function clearDisplay() {
    display.value = "";
}

// 🔥 Keyboard support
document.addEventListener("keydown", function(event) {
    let key = event.key;

    // Numbers
    if (!isNaN(key)) {
        display.value += key;
    }

    // Operators
    if (key === "+" || key === "-" || key === "*" || key === "/") {
        display.value += key;
    }

    // Decimal
    if (key === ".") {
        display.value += key;
    }

    // Enter = calculate
    if (key === "Enter") {
        calculate();
    }

    // Backspace = delete last
    if (key === "Backspace") {
        display.value = display.value.slice(0, -1);
    }

    // Escape = clear
    if (key === "Escape") {
        clearDisplay();
    }
});
</script>
